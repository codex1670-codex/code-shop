
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dukaan Card — Digital Shop Signboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  :root{
    --bg:#0B1120;
    --bg-2:#0E1526;
    --surface:#141B2E;
    --surface-2:#1C2540;
    --gold:#E8B84B;
    --gold-dim:#B8903A;
    --vermilion:#D14D3D;
    --cream:#F5EFE0;
    --muted:#8892B0;
    --line:rgba(232,184,75,0.22);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(1200px 600px at 20% -10%, rgba(232,184,75,0.10), transparent 60%),
      radial-gradient(900px 500px at 100% 10%, rgba(209,77,61,0.10), transparent 55%),
      var(--bg);
    color:var(--cream);
    font-family:'Inter',sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  #app{width:100%;max-width:1100px;}
  h1,h2,h3,.display{font-family:'Baloo 2',cursive;}
  a{color:var(--gold);}
  button{font-family:'Inter',sans-serif;cursor:pointer;border:none;}
  ::selection{background:var(--gold);color:#0B1120;}
  input, textarea{
    font-family:'Inter',sans-serif;
    background:var(--surface-2);
    border:1px solid var(--line);
    color:var(--cream);
    border-radius:10px;
    padding:12px 14px;
    font-size:14px;
    width:100%;
    outline:none;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  input:focus, textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(232,184,75,0.15);}
  textarea{resize:vertical;min-height:70px;}
  label{display:block;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-weight:600;}
  .field{margin-bottom:16px;}
 
  /* ---------- shared card chrome (hand-painted signboard look) ---------- */
  .board{
    position:relative;
    background:linear-gradient(180deg, var(--surface), var(--surface-2));
    border:1px solid var(--line);
    border-radius:20px;
    box-shadow:0 30px 60px -20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.03);
  }
  .board::before{
    content:'';
    position:absolute;inset:8px;
    border:1.5px dashed rgba(232,184,75,0.35);
    border-radius:14px;
    pointer-events:none;
  }
  .hooks{position:absolute;top:-14px;left:0;right:0;display:flex;justify-content:space-between;padding:0 40px;pointer-events:none;}
  .hooks span{width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 35% 30%, #f0d68a, var(--gold-dim));box-shadow:0 4px 8px rgba(0,0,0,0.4);}
 
  /* ---------- LOGIN ---------- */
  .login-wrap{display:flex;justify-content:center;padding:40px 16px;}
  .login-card{width:100%;max-width:400px;padding:44px 36px 36px;text-align:center;}
  .eyebrow{color:var(--gold);font-size:12px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;margin-bottom:10px;}
  .login-card h1{font-size:30px;margin:0 0 6px;color:var(--cream);}
  .login-card p.sub{color:var(--muted);font-size:14px;margin:0 0 28px;}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    background:var(--gold);color:#1a1204;font-weight:700;
    padding:13px 22px;border-radius:10px;font-size:14px;width:100%;
    transition:transform .15s ease, background .15s ease;
  }
  .btn:hover{background:#f0c563;transform:translateY(-1px);}
  .btn:active{transform:translateY(0);}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--cream);}
  .btn-ghost:hover{background:var(--surface-2);}
  .btn-vermilion{background:var(--vermilion);color:var(--cream);}
  .btn-vermilion:hover{background:#e05a48;}
  .error-msg{color:var(--vermilion);font-size:13px;margin-top:14px;min-height:18px;font-weight:600;}
 
  /* ---------- DASHBOARD ---------- */
  .dash{display:grid;grid-template-columns:1fr 1fr;gap:28px;align-items:start;}
  @media(max-width:820px){.dash{grid-template-columns:1fr;}}
  .panel{padding:28px;}
  .panel h2{font-size:20px;margin:0 0 4px;}
  .panel p.hint{color:var(--muted);font-size:13px;margin:0 0 22px;}
  .row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
  .top-bar .brand{display:flex;align-items:center;gap:10px;font-family:'Baloo 2';font-weight:700;font-size:18px;}
  .top-bar .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--gold);}
  .link-out{background:transparent;color:var(--muted);font-size:13px;border:1px solid var(--line);padding:8px 14px;border-radius:8px;}
  .link-out:hover{color:var(--cream);border-color:var(--gold);}
 
  /* preview card */
  .preview-stage{position:sticky;top:24px;padding:36px 28px;display:flex;flex-direction:column;align-items:center;}
  .logo-circle{
    width:84px;height:84px;border-radius:50%;
    background:var(--surface-2);border:2px solid var(--gold);
    display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:16px;
  }
  .logo-circle img{width:100%;height:100%;object-fit:cover;}
  .preview-name{font-size:24px;text-align:center;margin:0 0 4px;color:var(--gold);}
  .preview-line{color:var(--cream);font-size:13.5px;text-align:center;margin:2px 0;opacity:.9;}
  .preview-comment{margin-top:14px;font-size:13px;color:var(--muted);font-style:italic;text-align:center;border-top:1px dashed var(--line);padding-top:14px;width:100%;}
 
  .modal-backdrop{position:fixed;inset:0;background:rgba(4,6,14,0.72);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .modal{width:100%;max-width:440px;padding:30px;}
  .modal h3{margin:0 0 6px;font-size:19px;}
  .modal p{color:var(--muted);font-size:13px;line-height:1.5;margin:0 0 18px;}
  .modal .actions{display:flex;gap:10px;margin-top:18px;}
  .close-x{position:absolute;top:14px;right:16px;background:none;color:var(--muted);font-size:20px;line-height:1;}
  .close-x:hover{color:var(--cream);}
 
  .link-result{margin-top:16px;padding:14px;border-radius:10px;background:var(--surface-2);border:1px solid var(--line);display:flex;gap:8px;align-items:center;}
  .link-result input{background:transparent;border:none;color:var(--gold);font-size:12.5px;padding:4px;}
  .copy-btn{background:var(--gold);color:#1a1204;font-weight:700;font-size:12px;padding:9px 14px;border-radius:7px;white-space:nowrap;}
 
  .spinner{width:16px;height:16px;border-radius:50%;border:2px solid rgba(26,18,4,0.3);border-top-color:#1a1204;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .status-msg{font-size:12.5px;margin-top:10px;min-height:16px;}
  .status-msg.err{color:var(--vermilion);}
  .status-msg.ok{color:#7fd99a;}
 
  /* ---------- AD VIEW ---------- */
  .ad-stage{
    min-height:100vh;width:100%;
    display:flex;align-items:center;justify-content:center;
    perspective:1400px;
    position:fixed;inset:0;
    background:
      radial-gradient(1000px 600px at 50% 0%, rgba(232,184,75,0.12), transparent 60%),
      var(--bg);
    overflow:hidden;
  }
  .ad-glow{position:absolute;width:600px;height:600px;border-radius:50%;filter:blur(120px);opacity:.25;background:var(--gold);top:-200px;left:-150px;}
  .ad-glow.b{background:var(--vermilion);top:auto;bottom:-220px;right:-180px;left:auto;}
  .ad-card{
    position:relative;
    width:min(420px, 88vw);
    padding:48px 34px 38px;
    transform-style:preserve-3d;
    text-align:center;
    opacity:0;
  }
  .ad-card .logo-circle{width:104px;height:104px;margin:0 auto 20px;}
  .ad-card h1{font-size:30px;color:var(--gold);margin:0 0 10px;line-height:1.15;}
  .ad-line{display:flex;align-items:center;justify-content:center;gap:8px;font-size:14.5px;margin:8px 0;color:var(--cream);opacity:.92;}
  .ad-line svg{flex:none;width:16px;height:16px;stroke:var(--gold);}
  .ad-comment{margin-top:20px;padding-top:18px;border-top:1px dashed var(--line);font-style:italic;color:var(--muted);font-size:13.5px;line-height:1.5;}
  .ad-footer{margin-top:26px;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
  .ad-loading, .ad-error{color:var(--muted);font-size:14px;text-align:center;}
  .ad-error{color:var(--vermilion);}
 
  .storefront-icon{width:36px;height:36px;stroke:var(--gold-dim);}
</style>
</head>
<body>
<div id="app"></div>
 
<script>
/* ---------------- shared helpers ---------------- */
const app = document.getElementById('app');
let shopData = { name:'', logo:'', address:'', phone:'', comment:'' };
 
function esc(str){
  const d = document.createElement('div');
  d.innerText = str || '';
  return d.innerHTML;
}
 
function defaultLogoSVG(){
  return `data:image/svg+xml;utf8,` + encodeURIComponent(`
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
    <rect width="64" height="64" fill="#1C2540"/>
    <path d="M12 26 L14 14 H50 L52 26" fill="none" stroke="#E8B84B" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="14" y="26" width="36" height="24" fill="none" stroke="#E8B84B" stroke-width="2.5"/>
    <rect x="27" y="36" width="10" height="14" fill="none" stroke="#E8B84B" stroke-width="2"/>
  </svg>`);
}
 
/* ================= LOGIN VIEW ================= */
function renderLogin(){
  app.innerHTML = `
    <div class="login-wrap">
      <div class="board login-card">
        <div class="hooks"><span></span><span></span></div>
        <div class="eyebrow">Dukaan Card</div>
        <h1>Welcome back</h1>
        <p class="sub">Sign in to build your shop's digital signboard.</p>
        <div class="field" style="text-align:left">
          <label for="user">Username</label>
          <input id="user" type="text" autocomplete="username" placeholder="Enter username">
        </div>
        <div class="field" style="text-align:left">
          <label for="pass">Password</label>
          <input id="pass" type="password" autocomplete="current-password" placeholder="Enter password">
        </div>
        <button class="btn" id="loginBtn">Sign in</button>
        <div class="error-msg" id="loginErr"></div>
      </div>
    </div>
  `;
  const user = document.getElementById('user');
  const pass = document.getElementById('pass');
  const err = document.getElementById('loginErr');
  const tryLogin = () => {
    if(user.value.trim() === 'code-x' && pass.value === 'sanjiv'){
      err.textContent = '';
      renderDashboard();
    } else {
      err.textContent = 'Username or password is incorrect.';
      gsap.fromTo('.login-card', {x:-6}, {x:6, duration:0.06, repeat:5, yoyo:true, clearProps:'x'});
    }
  };
  document.getElementById('loginBtn').addEventListener('click', tryLogin);
  [user, pass].forEach(el => el.addEventListener('keydown', e => { if(e.key === 'Enter') tryLogin(); }));
  gsap.from('.login-card', {opacity:0, y:16, duration:.5, ease:'power2.out'});
}
 
/* ================= DASHBOARD VIEW ================= */
function renderDashboard(){
  app.innerHTML = `
    <div>
      <div class="top-bar">
        <div class="brand"><span class="dot"></span>Dukaan Card</div>
        <button class="link-out" id="logoutBtn">Log out</button>
      </div>
      <div class="dash">
        <div class="board panel">
          <h2>Shop details</h2>
          <p class="hint">Fill this in once — it powers your shareable signboard.</p>
 
          <div class="field">
            <label for="f-name">Shop name</label>
            <input id="f-name" type="text" placeholder="e.g. Sanjiv General Store" value="${esc(shopData.name)}">
          </div>
          <div class="field">
            <label for="f-logo">Logo URL <span style="text-transform:none;color:var(--muted)">(or upload below)</span></label>
            <input id="f-logo" type="text" placeholder="https://..." value="${esc(shopData.logo)}">
          </div>
          <div class="field">
            <label for="f-logo-file">Upload logo image</label>
            <input id="f-logo-file" type="file" accept="image/*">
          </div>
          <div class="field">
            <label for="f-address">Address</label>
            <textarea id="f-address" placeholder="Shop no, street, city, pincode">${esc(shopData.address)}</textarea>
          </div>
          <div class="field">
            <label for="f-phone">Phone number</label>
            <input id="f-phone" type="text" placeholder="+91 98765 43210" value="${esc(shopData.phone)}">
          </div>
          <div class="field">
            <label for="f-comment">Comment / tagline</label>
            <textarea id="f-comment" placeholder="e.g. Open all 7 days, 9am - 9pm">${esc(shopData.comment)}</textarea>
          </div>
 
          <button class="btn btn-vermilion" id="genLinkBtn">Generate shareable link</button>
        </div>
 
        <div class="board preview-stage">
          <div class="logo-circle" id="prevLogoWrap"><img id="prevLogo" src="${shopData.logo || defaultLogoSVG()}" onerror="this.src='${defaultLogoSVG()}'"></div>
          <h3 class="preview-name" id="prevName">${esc(shopData.name) || 'Your Shop Name'}</h3>
          <div class="preview-line" id="prevAddress">${esc(shopData.address) || 'Shop address will appear here'}</div>
          <div class="preview-line" id="prevPhone">${esc(shopData.phone) || 'Phone number'}</div>
          <div class="preview-comment" id="prevComment">${esc(shopData.comment) || 'Your tagline or comment shows here.'}</div>
        </div>
      </div>
    </div>
  `;
  gsap.from('.panel, .preview-stage', {opacity:0, y:14, duration:.5, stagger:.08, ease:'power2.out'});
 
  document.getElementById('logoutBtn').addEventListener('click', () => { renderLogin(); });
 
  const nameEl = document.getElementById('f-name');
  const logoEl = document.getElementById('f-logo');
  const logoFileEl = document.getElementById('f-logo-file');
  const addrEl = document.getElementById('f-address');
  const phoneEl = document.getElementById('f-phone');
  const commentEl = document.getElementById('f-comment');
 
  const sync = () => {
    shopData.name = nameEl.value;
    shopData.logo = logoEl.value;
    shopData.address = addrEl.value;
    shopData.phone = phoneEl.value;
    shopData.comment = commentEl.value;
    document.getElementById('prevName').textContent = shopData.name || 'Your Shop Name';
    document.getElementById('prevAddress').textContent = shopData.address || 'Shop address will appear here';
    document.getElementById('prevPhone').textContent = shopData.phone || 'Phone number';
    document.getElementById('prevComment').textContent = shopData.comment || 'Your tagline or comment shows here.';
    document.getElementById('prevLogo').src = shopData.logo || defaultLogoSVG();
  };
  [nameEl, logoEl, addrEl, phoneEl, commentEl].forEach(el => el.addEventListener('input', sync));
 
  logoFileEl.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      shopData.logo = reader.result;
      logoEl.value = '';
      document.getElementById('prevLogo').src = shopData.logo;
    };
    reader.readAsDataURL(file);
  });
 
  document.getElementById('genLinkBtn').addEventListener('click', () => {
    sync();
    if(!shopData.name.trim()){
      gsap.fromTo('#f-name', {x:-6}, {x:6, duration:0.06, repeat:5, yoyo:true, clearProps:'x'});
      nameEl.focus();
      return;
    }
    openTokenModal();
  });
}
 
/* ---------------- token modal + gist creation ---------------- */
function openTokenModal(){
  const wrap = document.createElement('div');
  wrap.className = 'modal-backdrop';
  wrap.innerHTML = `
    <div class="board modal">
      <button class="close-x" id="modalClose">&times;</button>
      <h3>Create your shareable link</h3>
      <p>This uses a GitHub personal access token to save your shop card as a private-by-default Gist and generate a link anyone can open. Create one at
        <a href="https://github.com/settings/tokens/new?scopes=gist&description=Dukaan%20Card" target="_blank" rel="noopener">github.com/settings/tokens</a>
        with just the <b>gist</b> scope. Your token is used only in your browser — it is never stored.</p>
      <div class="field">
        <label for="tokenInput">GitHub token</label>
        <input id="tokenInput" type="password" placeholder="ghp_...">
      </div>
      <div class="actions">
        <button class="btn" id="createLinkBtn">Generate link</button>
      </div>
      <div class="status-msg" id="tokenStatus"></div>
      <div id="linkResultHolder"></div>
    </div>
  `;
  document.body.appendChild(wrap);
  gsap.from(wrap.querySelector('.modal'), {opacity:0, y:12, scale:.97, duration:.35, ease:'power2.out'});
 
  const close = () => wrap.remove();
  wrap.addEventListener('click', (e) => { if(e.target === wrap) close(); });
  document.getElementById('modalClose').addEventListener('click', close);
 
  document.getElementById('createLinkBtn').addEventListener('click', async () => {
    const btn = document.getElementById('createLinkBtn');
    const status = document.getElementById('tokenStatus');
    const token = document.getElementById('tokenInput').value.trim();
    if(!token){
      status.textContent = 'Enter a GitHub token to continue.';
      status.className = 'status-msg err';
      return;
    }
    btn.innerHTML = '<span class="spinner"></span> Creating…';
    btn.disabled = true;
    status.textContent = '';
    status.className = 'status-msg';
 
    try{
      const res = await fetch('https://api.github.com/gists', {
        method:'POST',
        headers:{
          'Authorization': 'token ' + token,
          'Accept': 'application/vnd.github+json',
          'Content-Type':'application/json'
        },
        body: JSON.stringify({
          description: 'Dukaan Card — ' + (shopData.name || 'Shop'),
          public: true,
          files:{
            'shop-data.json': { content: JSON.stringify(shopData) }
          }
        })
      });
      if(!res.ok){
        const errBody = await res.json().catch(()=>({}));
        throw new Error(errBody.message || ('GitHub API error (' + res.status + ')'));
      }
      const data = await res.json();
      const shareUrl = window.location.origin + window.location.pathname + '#/view/' + data.id;
 
      status.textContent = 'Link created.';
      status.className = 'status-msg ok';
      btn.style.display = 'none';
 
      const holder = document.getElementById('linkResultHolder');
      holder.innerHTML = `
        <div class="link-result">
          <input type="text" readonly value="${esc(shareUrl)}" id="shareUrlField">
          <button class="copy-btn" id="copyBtn">Copy</button>
        </div>
        <p style="margin-top:12px;">Open this link on another phone to see the animated signboard.</p>
      `;
      document.getElementById('copyBtn').addEventListener('click', () => {
        const field = document.getElementById('shareUrlField');
        field.select();
        navigator.clipboard?.writeText(shareUrl).catch(()=>{});
        document.getElementById('copyBtn').textContent = 'Copied';
        setTimeout(() => { document.getElementById('copyBtn').textContent = 'Copy'; }, 1600);
      });
    } catch(e){
      status.textContent = e.message || 'Something went wrong. Check your token and try again.';
      status.className = 'status-msg err';
      btn.innerHTML = 'Generate link';
      btn.disabled = false;
    }
  });
}
 
/* ================= AD (VIEW) PAGE ================= */
async function renderAdView(gistId){
  app.innerHTML = `
    <div class="ad-stage">
      <div class="ad-glow"></div>
      <div class="ad-glow b"></div>
      <div class="ad-loading" id="adStatus">Loading shop card…</div>
    </div>
  `;
  try{
    const res = await fetch('https://api.github.com/gists/' + gistId);
    if(!res.ok) throw new Error('Card not found. The link may be incorrect or expired.');
    const data = await res.json();
    const file = data.files && data.files['shop-data.json'];
    if(!file) throw new Error('This card is missing its data file.');
    const info = JSON.parse(file.content);
    buildAdCard(info);
  } catch(e){
    document.getElementById('adStatus').textContent = e.message || 'Could not load this shop card.';
    document.getElementById('adStatus').className = 'ad-error';
  }
}
 
function buildAdCard(info){
  const stage = document.querySelector('.ad-stage');
  stage.innerHTML = `
    <div class="ad-glow"></div>
    <div class="ad-glow b"></div>
    <div class="board ad-card" id="adCard">
      <div class="hooks"><span></span><span></span></div>
      <div class="logo-circle" id="adLogoWrap">
        <img id="adLogo" src="${info.logo || defaultLogoSVG()}" onerror="this.src='${defaultLogoSVG()}'">
      </div>
      <h1 id="adName">${esc(info.name) || 'Shop Name'}</h1>
      ${info.address ? `<div class="ad-line" id="adAddress"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 22s7-7.4 7-13a7 7 0 10-14 0c0 5.6 7 13 7 13z"/><circle cx="12" cy="9" r="2.5"/></svg><span>${esc(info.address)}</span></div>` : ''}
      ${info.phone ? `<div class="ad-line" id="adPhone"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M4 4h4l2 5-2.5 1.5a11 11 0 005 5L14 13l5 2v4a2 2 0 01-2 2C9.5 21 3 14.5 3 6a2 2 0 012-2z"/></svg><span>${esc(info.phone)}</span></div>` : ''}
      ${info.comment ? `<div class="ad-comment" id="adComment">${esc(info.comment)}</div>` : ''}
      <div class="ad-footer">Digital Signboard</div>
    </div>
  `;
 
  const card = document.getElementById('adCard');
 
  // GSAP snap-zoom 3D entrance
  const tl = gsap.timeline({defaults:{ease:'back.out(1.7)'}});
  tl.set(card, {opacity:1})
    .fromTo(card, {scale:2.6, rotateY:35, rotateX:-18, z:-200},
                   {scale:1, rotateY:0, rotateX:0, z:0, duration:1, ease:'expo.out'})
    .fromTo('#adLogoWrap', {scale:0, rotate:-25}, {scale:1, rotate:0, duration:.6}, '-=0.5')
    .fromTo('#adName', {opacity:0, y:14, scale:1.3}, {opacity:1, y:0, scale:1, duration:.5}, '-=0.35')
    .fromTo(['#adAddress', '#adPhone'], {opacity:0, x:-16}, {opacity:1, x:0, duration:.4, stagger:.12}, '-=0.25')
    .fromTo('#adComment', {opacity:0, y:10}, {opacity:1, y:0, duration:.45}, '-=0.1')
    .fromTo('.ad-footer', {opacity:0}, {opacity:1, duration:.4}, '-=0.15');
 
  // ambient float
  gsap.to(card, {y:-8, duration:2.6, repeat:-1, yoyo:true, ease:'sine.inOut', delay:1});
 
  // pointer-driven 3D tilt for a live advertisement feel
  const stageEl = document.querySelector('.ad-stage');
  stageEl.addEventListener('mousemove', (e) => {
    const r = card.getBoundingClientRect();
    const px = (e.clientX - r.left) / r.width - 0.5;
    const py = (e.clientY - r.top) / r.height - 0.5;
    gsap.to(card, {rotateY: px * 16, rotateX: -py * 16, duration:.6, ease:'power2.out'});
  });
  stageEl.addEventListener('mouseleave', () => {
    gsap.to(card, {rotateY:0, rotateX:0, duration:.8, ease:'power2.out'});
  });
  stageEl.addEventListener('touchmove', (e) => {
    if(!e.touches[0]) return;
    const r = card.getBoundingClientRect();
    const px = (e.touches[0].clientX - r.left) / r.width - 0.5;
    const py = (e.touches[0].clientY - r.top) / r.height - 0.5;
    gsap.to(card, {rotateY: px * 14, rotateX: -py * 14, duration:.4, ease:'power2.out'});
  }, {passive:true});
}
 
/* ================= ROUTER ================= */
function route(){
  const hash = window.location.hash;
  const match = hash.match(/^#\/view\/(.+)$/);
  if(match){
    renderAdView(decodeURIComponent(match[1]));
  } else {
    renderLogin();
  }
}
window.addEventListener('hashchange', route);
route();
</script>
